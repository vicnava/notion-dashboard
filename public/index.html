<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Workspace VN</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --surface: #ffffff;
    --surface2: #f7f7f5;
    --border: #e9e9e7;
    --border2: #e1e1de;
    --text: #37352f;
    --muted: #9b9a97;
    --faint: #ebedf0;
    --accent: #2da44e;
    --accent-dim: rgba(45,164,78,0.10);
    --green1: #9be9a8;
    --green2: #40c463;
    --green3: #30a14e;
    --green4: #216e39;
    --hm-hover: rgba(0,0,0,0.18);
    --chart-tick: rgba(55,53,47,0.45);
    --chart-grid: rgba(55,53,47,0.07);
    --bar: #40c463;
    --bar-hover: #216e39;
    --line: #2da44e;
    --line-fill: rgba(45,164,78,0.10);
    --point: #2da44e;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #191919;
      --surface: #202020;
      --surface2: #252525;
      --border: rgba(255,255,255,0.094);
      --border2: rgba(255,255,255,0.13);
      --text: rgba(255,255,255,0.81);
      --muted: #7f7f7d;
      --faint: #2d2d2d;
      --accent: #3fb950;
      --accent-dim: rgba(63,185,80,0.14);
      --green1: #0e4429;
      --green2: #006d32;
      --green3: #26a641;
      --green4: #39d353;
      --hm-hover: rgba(255,255,255,0.30);
      --chart-tick: rgba(255,255,255,0.45);
      --chart-grid: rgba(255,255,255,0.07);
      --bar: #2ea043;
      --bar-hover: #39d353;
      --line: #3fb950;
      --line-fill: rgba(63,185,80,0.12);
      --point: #3fb950;
    }
  }

  html, body { background: var(--bg); }
  body {
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    font-variant-numeric: tabular-nums;
  }

  .shell { max-width: 880px; margin: 0 auto; padding: 1.1rem 1.25rem 1.75rem; }

  .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; gap: 1rem; }
  .topbar-left h1 { font-size: 15px; font-weight: 600; color: var(--text); letter-spacing: -0.01em; }
  .topbar-left .sub { font-size: 11.5px; color: var(--muted); margin-top: 2px; }
  .topbar-left .sub span { color: var(--accent); font-weight: 500; }

  .btn-refresh { background: var(--surface); border: 1px solid var(--border2); border-radius: 6px; padding: 5px 11px; font-size: 12px; font-family: var(--sans); color: #6b6b6b; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: background 0.15s, color 0.15s; white-space: nowrap; }
  .btn-refresh:hover { background: var(--surface2); color: var(--text); }
  .btn-refresh svg { width: 13px; height: 13px; }
  .btn-refresh.loading svg { animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 0.85rem; }
  @media (max-width: 560px) { .metrics { grid-template-columns: repeat(2, 1fr); } }
  .metric { background: var(--surface2); border: 1px solid var(--border); border-radius: 7px; padding: 10px 12px; }
  .metric .label { font-size: 10.5px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 5px; }
  .metric .value { font-size: 22px; font-weight: 600; color: var(--text); line-height: 1; letter-spacing: -0.02em; }
  .metric .value.accent { color: var(--accent); }
  .metric .sub { font-size: 10px; color: var(--muted); margin-top: 3px; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 0.9rem 1.05rem; margin-bottom: 0.7rem; }
  .card-title { font-size: 10.5px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.85rem; display: flex; align-items: center; justify-content: space-between; }
  .card-title .badge { font-size: 10px; color: var(--accent); background: var(--accent-dim); padding: 2px 8px; border-radius: 4px; text-transform: none; letter-spacing: 0; font-weight: 500; }

  .hm-labels-days { display: flex; flex-direction: column; gap: 3px; font-size: 9px; color: var(--muted); margin-right: 6px; flex-shrink: 0; }
  .hm-labels-days span { height: 11px; line-height: 11px; }
  .hm-cell { width: 11px; height: 11px; border-radius: 2px; cursor: default; }
  .hm-cell:hover { outline: 1px solid var(--hm-hover); outline-offset: -1px; }
  .hm-cell.out    { background: transparent; }
  .hm-cell.empty  { background: var(--faint); }
  .hm-cell.l1     { background: var(--green1); }
  .hm-cell.l2     { background: var(--green2); }
  .hm-cell.l3     { background: var(--green3); }
  .hm-cell.l4     { background: var(--green4); }

  .hm-scroll::-webkit-scrollbar { height: 6px; }
  .hm-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  .hm-scroll::-webkit-scrollbar-track { background: transparent; }

  .hm-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 9px; font-size: 10px; color: var(--muted); }
  .legend { display: flex; align-items: center; gap: 3px; }
  .legend-cell { width: 10px; height: 10px; border-radius: 2px; }

  .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 0.7rem; }
  @media (max-width: 560px) { .charts-row { grid-template-columns: 1fr; } }

  .proj-row { display: flex; align-items: center; gap: 10px; margin-bottom: 9px; }
  .proj-row:last-child { margin-bottom: 0; }
  .proj-name { font-size: 12px; color: var(--text); min-width: 140px; max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .proj-track { flex: 1; height: 7px; background: var(--faint); border-radius: 4px; overflow: hidden; }
  .proj-fill { height: 100%; border-radius: 4px; background: var(--green2); transition: width 0.6s cubic-bezier(.16,1,.3,1); }
  .proj-count { font-size: 11px; font-weight: 500; color: var(--muted); min-width: 26px; text-align: right; }

  .state-msg { text-align: center; padding: 1.75rem; color: var(--muted); font-size: 13px; }

  .error-banner { background: #fdf0ef; border: 1px solid #f5c6c2; border-radius: 7px; padding: 10px 14px; font-size: 12px; color: #c0392b; margin-bottom: 0.7rem; display: none; }

  #tooltip { position: fixed; background: #2f2f2f; border: 1px solid #444; border-radius: 6px; padding: 5px 9px; font-size: 11px; color: #fff; pointer-events: none; z-index: 1000; opacity: 0; transition: opacity 0.1s; white-space: nowrap; }
</style>
</head>
<body>
<div id="tooltip"></div>
<div class="shell">

  <div class="topbar">
    <div class="topbar-left">
      <h1>Actividad · Victor Navarrete</h1>
      <div class="sub" id="date-range">cargando…</div>
    </div>
    <button class="btn-refresh" id="btn-refresh" onclick="loadData()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M13.5 8A5.5 5.5 0 1 1 8 2.5c1.8 0 3.4.87 4.4 2.2" stroke-linecap="round"/>
        <polyline points="10,2 12.5,4.7 10,7" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      actualizar
    </button>
  </div>

  <div class="error-banner" id="error-banner"></div>

  <div class="metrics">
    <div class="metric"><div class="label">total completadas</div><div class="value" id="m-total">—</div><div class="sub">último año</div></div>
    <div class="metric"><div class="label">esta semana</div><div class="value accent" id="m-week">—</div><div class="sub">tareas</div></div>
    <div class="metric"><div class="label">este mes</div><div class="value" id="m-month">—</div><div class="sub">tareas</div></div>
    <div class="metric"><div class="label">racha actual</div><div class="value" id="m-streak">—</div><div class="sub">días seguidos</div></div>
  </div>

  <div class="card">
    <div class="card-title">contribuciones · tareas completadas <span class="badge" id="hm-badge">—</span></div>
    <div id="heatmap-body"><div class="state-msg">cargando…</div></div>
    <div class="hm-footer">
      <span id="hm-note" style="font-size:10px;color:var(--muted)"></span>
      <div class="legend">
        <span style="margin-right:4px">menos</span>
        <div class="legend-cell" style="background:var(--faint)"></div>
        <div class="legend-cell" style="background:var(--green1)"></div>
        <div class="legend-cell" style="background:var(--green2)"></div>
        <div class="legend-cell" style="background:var(--green3)"></div>
        <div class="legend-cell" style="background:var(--green4)"></div>
        <span style="margin-left:4px">más</span>
      </div>
    </div>
  </div>

  <div class="charts-row">
    <div class="card" style="margin-bottom:0">
      <div class="card-title">por día de la semana</div>
      <div style="position:relative;height:110px"><canvas id="chart-dow" role="img" aria-label="Actividad por día de la semana"></canvas></div>
    </div>
    <div class="card" style="margin-bottom:0">
      <div class="card-title">tendencia mensual</div>
      <div style="position:relative;height:110px"><canvas id="chart-monthly" role="img" aria-label="Tareas completadas por mes"></canvas></div>
    </div>
  </div>

  <div class="card" style="margin-top:0.7rem;margin-bottom:0">
    <div class="card-title">top proyectos</div>
    <div id="project-bars"><div class="state-msg" style="padding:1rem">—</div></div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const DB_ID = '1adef8fc-ea18-802a-b582-c586f9c2f465';
const localISO = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

async function fetchPage(cursor) {
  const body = { dbId: DB_ID };
  if (cursor) body.cursor = cursor;
  const resp = await fetch('/api/notion', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error(err.message || `Error ${resp.status}`);
  }
  return resp.json();
}

async function fetchAll() {
  let all = [], cursor = null;
  do {
    const data = await fetchPage(cursor);
    all = all.concat(data.results);
    cursor = data.has_more ? data.next_cursor : null;
  } while (cursor);
  return all;
}

function parseTasks(pages) {
  return pages.map(p => {
    const props = p.properties;
    const fechaStart = props['Fecha Inicio']?.date?.start || null;
    const date = fechaStart ? fechaStart.split('T')[0] : p.created_time?.split('T')[0];
    let project = '';
    const rollup = props['Cliente Proyecto'];
    if (rollup?.rollup?.array?.length) project = rollup.rollup.array[0]?.title?.[0]?.plain_text || '';
    return { date, project };
  }).filter(t => t.date);
}

let chartDow = null, chartMonthly = null;
let _byDate = null, _today = null, _months = null;

async function loadData() {
  setLoading(true);
  hideError();
  try {
    const pages = await fetchAll();
    buildDashboard(parseTasks(pages));
  } catch(e) {
    showError(`Error: ${e.message}`);
    setLoading(false);
  }
}

function setLoading(on) {
  document.getElementById('btn-refresh').classList.toggle('loading', on);
  if (on) document.getElementById('heatmap-body').innerHTML = '<div class="state-msg">consultando notion…</div>';
}
function showError(msg) { const el = document.getElementById('error-banner'); el.textContent = msg; el.style.display = 'block'; }
function hideError() { document.getElementById('error-banner').style.display = 'none'; }

function buildDashboard(tasks) {
  const today = new Date();
  const yearAgo = new Date(today); yearAgo.setFullYear(today.getFullYear() - 1);
  const ya = localISO(yearAgo);

  const byDate = {}, byProject = {};
  tasks.forEach(t => {
    if (t.date < ya) return;
    byDate[t.date] = (byDate[t.date] || 0) + 1;
    if (t.project) byProject[t.project] = (byProject[t.project] || 0) + 1;
  });

  const total = Object.values(byDate).reduce((a,b) => a+b, 0);
  const td = localISO(today);
  const weekStart = new Date(today); weekStart.setDate(today.getDate() - today.getDay());
  const ws = localISO(weekStart);
  const ms = td.slice(0,7) + '-01';
  const weekCount  = Object.entries(byDate).filter(([d]) => d >= ws).reduce((a,[,v]) => a+v, 0);
  const monthCount = Object.entries(byDate).filter(([d]) => d >= ms).reduce((a,[,v]) => a+v, 0);

  let streak = 0;
  const chk = new Date(today);
  while (byDate[localISO(chk)]) { streak++; chk.setDate(chk.getDate()-1); }

  document.getElementById('m-total').textContent  = total;
  document.getElementById('m-week').textContent   = weekCount;
  document.getElementById('m-month').textContent  = monthCount;
  document.getElementById('m-streak').textContent = streak;
  document.getElementById('hm-badge').textContent = `${total} en el último año`;

  const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  const from = yearAgo.toLocaleDateString('es-MX', {month:'short',year:'numeric'});
  const to   = today.toLocaleDateString('es-MX',   {month:'short',year:'numeric'});
  document.getElementById('date-range').innerHTML = `${from} — ${to} &nbsp;·&nbsp; <span>${total} tareas completadas</span>`;

  _byDate = byDate; _today = today; _months = months;
  buildHeatmap(byDate, today, yearAgo, months);
  buildCharts(byDate, today, months);
  buildProjects(byProject);
  setLoading(false);
}

function buildHeatmap(byDate, today, yearAgo, months) {
  const cells = [];
  const cur = new Date(yearAgo);
  cur.setDate(cur.getDate() - cur.getDay());
  const ya = localISO(yearAgo);
  const td = localISO(today);

  while (cur <= today) {
    const ds = localISO(cur);
    cells.push({ date: ds, count: (ds >= ya && ds <= td) ? (byDate[ds] || 0) : -1, month: cur.getMonth() });
    cur.setDate(cur.getDate() + 1);
  }

  const weeks = [];
  for (let i = 0; i < cells.length; i += 7) weeks.push(cells.slice(i, i+7));

  const monthLabels = [];
  let lastM = -1;
  weeks.forEach((w, wi) => {
    const f = w.find(c => c.count >= 0);
    if (f && f.month !== lastM) { monthLabels.push({wi, label: months[f.month]}); lastM = f.month; }
  });

  function cls(n) { if (n < 0) return 'out'; if (!n) return 'empty'; if (n===1) return 'l1'; if (n<=3) return 'l2'; if (n<=6) return 'l3'; return 'l4'; }

  const wrap = document.createElement('div');
  wrap.style.cssText = 'display:flex;align-items:flex-start';

  const dayLbls = document.createElement('div');
  dayLbls.className = 'hm-labels-days';
  ['','lun','','mié','','vie',''].forEach(l => { const s = document.createElement('span'); s.textContent = l; dayLbls.appendChild(s); });

  const scroll = document.createElement('div');
  scroll.className = 'hm-scroll';
  scroll.style.cssText = 'overflow-x:auto;flex:1';

  const inner = document.createElement('div');
  inner.style.cssText = 'display:flex;flex-direction:column';

  const mRow = document.createElement('div');
  mRow.style.cssText = `position:relative;margin-bottom:5px;height:14px;width:${weeks.length*14}px;font-size:10px;color:var(--muted)`;
  monthLabels.forEach(({wi, label}) => {
    const lb = document.createElement('span');
    lb.style.cssText = `position:absolute;left:${wi*14}px;white-space:nowrap`;
    lb.textContent = label;
    mRow.appendChild(lb);
  });

  const grid = document.createElement('div');
  grid.style.cssText = 'display:flex;gap:3px;min-width:max-content';
  weeks.forEach(week => {
    const col = document.createElement('div');
    col.style.cssText = 'display:flex;flex-direction:column;gap:3px';
    week.forEach(c => {
      const cell = document.createElement('div');
      cell.className = `hm-cell ${cls(c.count)}`;
      if (c.count >= 0) {
        const dl = new Date(c.date + 'T12:00:00').toLocaleDateString('es-MX', {weekday:'short',day:'numeric',month:'short'});
        cell.addEventListener('mouseenter', e => showTip(e, `${dl} · ${c.count} tarea${c.count!==1?'s':''}`));
        cell.addEventListener('mouseleave', hideTip);
        cell.addEventListener('mousemove', moveTip);
      }
      col.appendChild(cell);
    });
    grid.appendChild(col);
  });

  inner.appendChild(mRow);
  inner.appendChild(grid);
  scroll.appendChild(inner);
  wrap.appendChild(dayLbls);
  wrap.appendChild(scroll);

  document.getElementById('heatmap-body').innerHTML = '';
  document.getElementById('heatmap-body').appendChild(wrap);
  document.getElementById('hm-note').textContent = `${Object.keys(byDate).length} días con actividad`;
  // arranca mostrando lo más reciente
  scroll.scrollLeft = scroll.scrollWidth;
}

const tip = document.getElementById('tooltip');
function showTip(e, t) { tip.textContent = t; tip.style.opacity = '1'; moveTip(e); }
function hideTip() { tip.style.opacity = '0'; }
function moveTip(e) { tip.style.left = (e.clientX+14)+'px'; tip.style.top = (e.clientY-28)+'px'; }

function buildCharts(byDate, today, months) {
  const css = getComputedStyle(document.documentElement);
  const v = n => css.getPropertyValue(n).trim();
  const tc = v('--chart-tick'), gc = v('--chart-grid');
  const dowCounts = [0,0,0,0,0,0,0];
  Object.entries(byDate).forEach(([d,n]) => { dowCounts[new Date(d+'T12:00:00').getDay()] += n; });

  if (chartDow) chartDow.destroy();
  chartDow = new Chart(document.getElementById('chart-dow'), {
    type: 'bar',
    data: { labels: ['dom','lun','mar','mié','jue','vie','sáb'], datasets: [{ data: dowCounts, backgroundColor: v('--bar'), borderRadius: 3, hoverBackgroundColor: v('--bar-hover') }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ` ${ctx.raw} tareas` } } }, scales: { x: { ticks: { color: tc, font: { size: 10 } }, grid: { display: false }, border: { display: false } }, y: { ticks: { color: tc, font: { size: 10 } }, grid: { color: gc }, border: { display: false }, beginAtZero: true } } }
  });

  const mLabels = [], mData = [];
  for (let i = 11; i >= 0; i--) {
    const d = new Date(today); d.setMonth(d.getMonth()-i);
    const ym = localISO(d).slice(0,7);
    mLabels.push(months[d.getMonth()]);
    mData.push(Object.entries(byDate).filter(([dt]) => dt.startsWith(ym)).reduce((a,[,v]) => a+v, 0));
  }
  if (chartMonthly) chartMonthly.destroy();
  chartMonthly = new Chart(document.getElementById('chart-monthly'), {
    type: 'line',
    data: { labels: mLabels, datasets: [{ data: mData, borderColor: v('--line'), backgroundColor: v('--line-fill'), tension: 0.4, fill: true, pointBackgroundColor: v('--point'), pointRadius: 3, pointHoverRadius: 5 }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ` ${ctx.raw} tareas` } } }, scales: { x: { ticks: { color: tc, font: { size: 10 } }, grid: { display: false }, border: { display: false } }, y: { ticks: { color: tc, font: { size: 10 } }, grid: { color: gc }, border: { display: false }, beginAtZero: true } } }
  });
}

function buildProjects(byProject) {
  const top = Object.entries(byProject).sort((a,b) => b[1]-a[1]).slice(0,5);
  const el = document.getElementById('project-bars');
  if (!top.length) { el.innerHTML = '<div class="state-msg" style="padding:1rem;font-size:12px">sin datos de proyecto</div>'; return; }
  const max = top[0][1];
  el.innerHTML = top.map(([name, count]) => {
    const pct = Math.round((count/max)*100);
    const short = name.length > 30 ? name.slice(0,28)+'…' : name;
    return `<div class="proj-row"><span class="proj-name" title="${name}">${short}</span><div class="proj-track"><div class="proj-fill" style="width:${pct}%"></div></div><span class="proj-count">${count}</span></div>`;
  }).join('');
}

window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
  if (_byDate) buildCharts(_byDate, _today, _months);
});

loadData();
</script>
</body>
</html>
