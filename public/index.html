<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Workspace VN</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --surface: #ffffff;
    --surface2: #f7f7f5;
    --border: #e9e9e7;
    --border2: #e1e1de;
    --text: #37352f;
    --muted: #9b9a97;
    --faint: #ebedf0;
    --accent: #2da44e;
    --accent-dim: rgba(45,164,78,0.10);
    --green1: #9be9a8;
    --green2: #40c463;
    --green3: #30a14e;
    --green4: #216e39;
    --hm-hover: rgba(0,0,0,0.18);
    --chart-tick: rgba(55,53,47,0.45);
    --chart-grid: rgba(55,53,47,0.07);
    --bar: #40c463;
    --bar-hover: #216e39;
    --line: #2da44e;
    --line-fill: rgba(45,164,78,0.10);
    --point: #2da44e;
    --shadow: rgba(0,0,0,0.06);
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #191919;
      --surface: #202020;
      --surface2: #252525;
      --border: rgba(255,255,255,0.094);
      --border2: rgba(255,255,255,0.13);
      --text: rgba(255,255,255,0.81);
      --muted: #7f7f7d;
      --faint: #2d2d2d;
      --accent: #3fb950;
      --accent-dim: rgba(63,185,80,0.14);
      --green1: #0e4429;
      --green2: #006d32;
      --green3: #26a641;
      --green4: #39d353;
      --hm-hover: rgba(255,255,255,0.30);
      --chart-tick: rgba(255,255,255,0.45);
      --chart-grid: rgba(255,255,255,0.07);
      --bar: #2ea043;
      --bar-hover: #39d353;
      --line: #3fb950;
      --line-fill: rgba(63,185,80,0.12);
      --point: #3fb950;
      --shadow: rgba(0,0,0,0.3);
    }
  }

  html, body { background: var(--bg); }
  body {
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    font-variant-numeric: tabular-nums;
  }

  .shell { max-width: 880px; margin: 0 auto; padding: 1.1rem 1.25rem 1.75rem; }

  .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.85rem; gap: 1rem; }
  .topbar-left h1 { font-size: 15px; font-weight: 600; color: var(--text); letter-spacing: -0.01em; }
  .topbar-left .sub { font-size: 11.5px; color: var(--muted); margin-top: 2px; }
  .topbar-left .sub span { color: var(--accent); font-weight: 500; }

  .btn-refresh { background: var(--surface); border: 1px solid var(--border2); border-radius: 6px; padding: 5px 11px; font-size: 12px; font-family: var(--sans); color: #6b6b6b; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: background 0.15s, color 0.15s; white-space: nowrap; }
  .btn-refresh:hover { background: var(--surface2); color: var(--text); }
  .btn-refresh svg { width: 13px; height: 13px; }
  .btn-refresh.loading svg { animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* controles de periodo */
  .controls { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; margin-bottom: 0.85rem; }
  .seg { display: inline-flex; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 2px; gap: 2px; }
  .seg button { border: 0; background: transparent; color: var(--muted); font: inherit; font-size: 12px; padding: 5px 12px; border-radius: 6px; cursor: pointer; transition: background 0.12s, color 0.12s; }
  .seg button:hover { color: var(--text); }
  .seg button.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 2px var(--shadow); font-weight: 500; }
  .ctl-extra { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); }
  .ctl-extra button { border: 1px solid var(--border2); background: var(--surface); color: var(--text); border-radius: 6px; width: 26px; height: 26px; cursor: pointer; font-size: 14px; line-height: 1; display: flex; align-items: center; justify-content: center; }
  .ctl-extra button:disabled { opacity: 0.35; cursor: default; }
  .ctl-extra input[type=date] { font: inherit; font-size: 12px; padding: 4px 7px; border: 1px solid var(--border2); border-radius: 6px; background: var(--surface); color: var(--text); }
  .ctl-month { min-width: 130px; text-align: center; color: var(--text); font-weight: 500; text-transform: capitalize; }

  .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 0.85rem; }
  @media (max-width: 560px) { .metrics { grid-template-columns: repeat(2, 1fr); } }
  .metric { background: var(--surface2); border: 1px solid var(--border); border-radius: 7px; padding: 10px 12px; }
  .metric .label { font-size: 10.5px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 5px; }
  .metric .value { font-size: 22px; font-weight: 600; color: var(--text); line-height: 1; letter-spacing: -0.02em; }
  .metric .value.accent { color: var(--accent); }
  .metric .sub { font-size: 10px; color: var(--muted); margin-top: 3px; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 0.9rem 1.05rem; margin-bottom: 0.7rem; }
  .card-title { font-size: 10.5px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.85rem; display: flex; align-items: center; justify-content: space-between; }
  .card-title .badge { font-size: 10px; color: var(--accent); background: var(--accent-dim); padding: 2px 8px; border-radius: 4px; text-transform: none; letter-spacing: 0; font-weight: 500; }

  .hm-labels-days { display: flex; flex-direction: column; gap: 3px; font-size: 9px; color: var(--muted); margin-right: 6px; margin-top: 19px; flex-shrink: 0; }
  .hm-labels-days span { height: 11px; line-height: 11px; }
  .hm-cell { width: 11px; height: 11px; border-radius: 2px; cursor: default; }
  .hm-cell:hover { outline: 1px solid var(--hm-hover); outline-offset: -1px; }
  .hm-cell.out    { background: transparent; }
  .hm-cell.empty  { background: var(--faint); }
  .hm-cell.l1     { background: var(--green1); }
  .hm-cell.l2     { background: var(--green2); }
  .hm-cell.l3     { background: var(--green3); }
  .hm-cell.l4     { background: var(--green4); }

  .hm-scroll { scrollbar-width: thin; scrollbar-color: transparent transparent; transition: scrollbar-color 0.2s; }
  .hm-scroll:hover { scrollbar-color: var(--border2) transparent; }
  .hm-scroll::-webkit-scrollbar { height: 6px; }
  .hm-scroll::-webkit-scrollbar-track { background: transparent; }
  .hm-scroll::-webkit-scrollbar-thumb { background: transparent; border-radius: 3px; transition: background 0.2s; }
  .hm-scroll:hover::-webkit-scrollbar-thumb { background: var(--border2); }

  .hm-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 9px; font-size: 10px; color: var(--muted); }
  .legend { display: flex; align-items: center; gap: 3px; }
  .legend-cell { width: 10px; height: 10px; border-radius: 2px; }

  /* calendario mensual */
  .cal { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
  .cal-head { font-size: 10px; color: var(--muted); text-align: center; padding-bottom: 2px; text-transform: capitalize; }
  .cal-cell { height: 40px; border-radius: 6px; display: flex; align-items: flex-start; justify-content: flex-end; padding: 4px 6px; font-size: 11px; font-weight: 500; }
  .cal-cell.blank { background: transparent; }
  .cal-cell.empty { background: var(--faint); color: var(--muted); }
  .cal-cell.l1 { background: var(--green1); color: var(--text); }
  .cal-cell.l2 { background: var(--green2); color: #fff; }
  .cal-cell.l3 { background: var(--green3); color: #fff; }
  .cal-cell.l4 { background: var(--green4); color: #fff; }
  .cal-cell.today { outline: 2px solid var(--accent); outline-offset: -2px; }

  .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 0.7rem; }
  @media (max-width: 560px) { .charts-row { grid-template-columns: 1fr; } }

  .bars-empty { font-size: 12px; color: var(--muted); padding: 0.5rem 0; }
  .proj-row { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
  .proj-row:last-child { margin-bottom: 0; }
  .proj-head { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; }
  .proj-name { font-size: 12.5px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .proj-track { height: 7px; background: var(--faint); border-radius: 4px; overflow: hidden; }
  .proj-fill { height: 100%; border-radius: 4px; background: var(--green2); transition: width 0.6s cubic-bezier(.16,1,.3,1); }
  .proj-count { font-size: 11px; font-weight: 600; color: var(--muted); flex-shrink: 0; }

  .state-msg { text-align: center; padding: 1.75rem; color: var(--muted); font-size: 13px; }
  .error-banner { background: #fdf0ef; border: 1px solid #f5c6c2; border-radius: 7px; padding: 10px 14px; font-size: 12px; color: #c0392b; margin-bottom: 0.7rem; display: none; }

  #tooltip { position: fixed; background: #2f2f2f; border: 1px solid #444; border-radius: 6px; padding: 5px 9px; font-size: 11px; color: #fff; pointer-events: none; z-index: 1000; opacity: 0; transition: opacity 0.1s; white-space: nowrap; }
</style>
</head>
<body>
<div id="tooltip"></div>
<div class="shell">

  <div class="topbar">
    <div class="topbar-left">
      <h1>Actividad · Victor Navarrete</h1>
      <div class="sub" id="date-range">cargando…</div>
    </div>
    <button class="btn-refresh" id="btn-refresh" onclick="loadData()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M13.5 8A5.5 5.5 0 1 1 8 2.5c1.8 0 3.4.87 4.4 2.2" stroke-linecap="round"/>
        <polyline points="10,2 12.5,4.7 10,7" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      actualizar
    </button>
  </div>

  <div class="controls">
    <div class="seg" id="seg">
      <button data-mode="anio" class="active">Año</button>
      <button data-mode="trim">90 días</button>
      <button data-mode="mes">Mes</button>
      <button data-mode="custom">Personalizado</button>
    </div>
    <div class="ctl-extra" id="ctl-extra"></div>
  </div>

  <div class="error-banner" id="error-banner"></div>

  <div class="metrics">
    <div class="metric"><div class="label">total completadas</div><div class="value" id="m-total">—</div><div class="sub" id="m-total-sub">en el período</div></div>
    <div class="metric"><div class="label">esta semana</div><div class="value accent" id="m-week">—</div><div class="sub">tareas</div></div>
    <div class="metric"><div class="label">este mes</div><div class="value" id="m-month">—</div><div class="sub">tareas</div></div>
    <div class="metric"><div class="label">racha actual</div><div class="value" id="m-streak">—</div><div class="sub">días seguidos</div></div>
  </div>

  <div class="card">
    <div class="card-title">contribuciones · tareas completadas <span class="badge" id="hm-badge">—</span></div>
    <div id="heatmap-body"><div class="state-msg">cargando…</div></div>
    <div class="hm-footer">
      <span id="hm-note" style="font-size:10px;color:var(--muted)"></span>
      <div class="legend">
        <span style="margin-right:4px">menos</span>
        <div class="legend-cell" style="background:var(--faint)"></div>
        <div class="legend-cell" style="background:var(--green1)"></div>
        <div class="legend-cell" style="background:var(--green2)"></div>
        <div class="legend-cell" style="background:var(--green3)"></div>
        <div class="legend-cell" style="background:var(--green4)"></div>
        <span style="margin-left:4px">más</span>
      </div>
    </div>
  </div>

  <div class="charts-row">
    <div class="card" style="margin-bottom:0">
      <div class="card-title">por día de la semana</div>
      <div style="position:relative;height:110px"><canvas id="chart-dow" role="img" aria-label="Actividad por día de la semana"></canvas></div>
    </div>
    <div class="card" style="margin-bottom:0">
      <div class="card-title" id="trend-title">tendencia mensual</div>
      <div style="position:relative;height:110px"><canvas id="chart-trend" role="img" aria-label="Tendencia de tareas completadas"></canvas></div>
    </div>
  </div>

  <div class="charts-row">
    <div class="card" style="margin-bottom:0">
      <div class="card-title">por tipo de tarea</div>
      <div id="type-bars"><div class="bars-empty">—</div></div>
    </div>
    <div class="card" style="margin-bottom:0">
      <div class="card-title">por cliente</div>
      <div id="client-bars"><div class="bars-empty">—</div></div>
    </div>
  </div>

  <div class="card" style="margin-top:0.7rem;margin-bottom:0">
    <div class="card-title">top proyectos</div>
    <div id="project-bars"><div class="bars-empty">—</div></div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const DB_ID = '1adef8fc-ea18-802a-b582-c586f9c2f465';
const MONTHS = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
const localISO = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

let allTasks = [];
let chartDow = null, chartTrend = null;
const firstOfMonth = d => new Date(d.getFullYear(), d.getMonth(), 1);
const state = { mode: 'anio', monthAnchor: firstOfMonth(new Date()), customFrom: null, customTo: null };

/* ---------- carga de datos ---------- */
async function fetchPage(cursor) {
  const body = { dbId: DB_ID };
  if (cursor) body.cursor = cursor;
  const resp = await fetch('/api/notion', {
    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body)
  });
  if (!resp.ok) { const err = await resp.json().catch(() => ({})); throw new Error(err.message || `Error ${resp.status}`); }
  return resp.json();
}
async function fetchAll() {
  let all = [], cursor = null;
  do { const data = await fetchPage(cursor); all = all.concat(data.results); cursor = data.has_more ? data.next_cursor : null; } while (cursor);
  return all;
}
function parseTasks(pages) {
  return pages.map(p => {
    const props = p.properties;
    const fi = props['Fecha Inicio']?.date?.start || null;
    const date = fi ? fi.split('T')[0] : p.created_time?.split('T')[0];
    let project = '';
    const rp = props['Cliente Proyecto'];
    if (rp?.rollup?.array?.length) project = rp.rollup.array[0]?.title?.[0]?.plain_text || '';
    const tipo = props['Tipo']?.select?.name || '';
    const clientes = [];
    (props['Cliente']?.rollup?.array || []).forEach(it => {
      if (it.type === 'multi_select') it.multi_select.forEach(o => { if (!clientes.includes(o.name)) clientes.push(o.name); });
    });
    return { date, project, tipo, clientes };
  }).filter(t => t.date);
}

async function loadData() {
  setLoading(true); hideError();
  try { allTasks = parseTasks(await fetchAll()); render(); }
  catch(e) { showError(`Error: ${e.message}`); setLoading(false); }
}
function setLoading(on) {
  document.getElementById('btn-refresh').classList.toggle('loading', on);
  if (on) document.getElementById('heatmap-body').innerHTML = '<div class="state-msg">consultando notion…</div>';
}
function showError(msg) { const el = document.getElementById('error-banner'); el.textContent = msg; el.style.display = 'block'; }
function hideError() { document.getElementById('error-banner').style.display = 'none'; }

/* ---------- período ---------- */
function rangeOf() {
  const today = new Date();
  if (state.mode === 'trim') { const f = new Date(today); f.setDate(f.getDate() - 89); return { from: f, to: today }; }
  if (state.mode === 'mes')  { const a = state.monthAnchor; return { from: new Date(a.getFullYear(), a.getMonth(), 1), to: new Date(a.getFullYear(), a.getMonth()+1, 0) }; }
  if (state.mode === 'custom') {
    const f = state.customFrom || (()=>{ const x=new Date(today); x.setDate(x.getDate()-89); return x; })();
    const t = state.customTo || today;
    return { from: f, to: t };
  }
  const f = new Date(today); f.setFullYear(f.getFullYear() - 1); // anio
  return { from: f, to: today };
}

function renderControls() {
  document.querySelectorAll('#seg button').forEach(b => b.classList.toggle('active', b.dataset.mode === state.mode));
  const ex = document.getElementById('ctl-extra');
  const today = new Date();
  if (state.mode === 'mes') {
    const a = state.monthAnchor;
    const label = a.toLocaleDateString('es-MX', { month: 'long', year: 'numeric' });
    const isCurrent = a.getFullYear() === today.getFullYear() && a.getMonth() === today.getMonth();
    ex.innerHTML = `<button id="m-prev">‹</button><span class="ctl-month">${label}</span><button id="m-next"${isCurrent?' disabled':''}>›</button>`;
    document.getElementById('m-prev').onclick = () => { state.monthAnchor = new Date(a.getFullYear(), a.getMonth()-1, 1); render(); };
    const nx = document.getElementById('m-next'); if (!isCurrent) nx.onclick = () => { state.monthAnchor = new Date(a.getFullYear(), a.getMonth()+1, 1); render(); };
  } else if (state.mode === 'custom') {
    const r = rangeOf();
    ex.innerHTML = `<input type="date" id="c-from" value="${localISO(r.from)}"> <span>—</span> <input type="date" id="c-to" value="${localISO(r.to)}">`;
    const upd = () => {
      const f = document.getElementById('c-from').value, t = document.getElementById('c-to').value;
      if (f && t && f <= t) { state.customFrom = new Date(f + 'T12:00:00'); state.customTo = new Date(t + 'T12:00:00'); render(); }
    };
    document.getElementById('c-from').onchange = upd; document.getElementById('c-to').onchange = upd;
  } else { ex.innerHTML = ''; }
}

/* ---------- render principal ---------- */
function render() {
  renderControls();
  const { from, to } = rangeOf();
  const fromS = localISO(from), toS = localISO(to);
  const tasks = allTasks.filter(t => t.date >= fromS && t.date <= toS);

  const byDate = {}, byProject = {}, byType = {}, byClient = {};
  tasks.forEach(t => {
    byDate[t.date] = (byDate[t.date] || 0) + 1;
    if (t.project) byProject[t.project] = (byProject[t.project] || 0) + 1;
    if (t.tipo) byType[t.tipo] = (byType[t.tipo] || 0) + 1;
    t.clientes.forEach(c => byClient[c] = (byClient[c] || 0) + 1);
  });
  const total = tasks.length;

  /* KPIs: total = período; semana/mes/racha = vivos (fecha actual) */
  const today = new Date();
  const td = localISO(today);
  const ws = (() => { const d = new Date(today); d.setDate(d.getDate() - ((d.getDay()+6)%7)); return localISO(d); })();
  const ms = td.slice(0,7) + '-01';
  const liveDate = {};
  allTasks.forEach(t => { liveDate[t.date] = (liveDate[t.date] || 0) + 1; });
  const weekCount = Object.entries(liveDate).filter(([d]) => d >= ws).reduce((a,[,v]) => a+v, 0);
  const monthCount = Object.entries(liveDate).filter(([d]) => d >= ms).reduce((a,[,v]) => a+v, 0);
  let streak = 0; const chk = new Date(today);
  if (!liveDate[localISO(chk)]) chk.setDate(chk.getDate()-1);
  while (liveDate[localISO(chk)]) { streak++; chk.setDate(chk.getDate()-1); }

  document.getElementById('m-total').textContent  = total;
  document.getElementById('m-week').textContent   = weekCount;
  document.getElementById('m-month').textContent  = monthCount;
  document.getElementById('m-streak').textContent = streak;

  const fromLbl = from.toLocaleDateString('es-MX', { day: 'numeric', month: 'short', year: 'numeric' });
  const toLbl   = to.toLocaleDateString('es-MX',   { day: 'numeric', month: 'short', year: 'numeric' });
  document.getElementById('date-range').innerHTML = `${fromLbl} — ${toLbl} &nbsp;·&nbsp; <span>${total} tareas completadas</span>`;
  document.getElementById('hm-badge').textContent = `${total} en el período`;
  document.getElementById('m-total-sub').textContent = state.mode === 'anio' ? 'último año' : 'en el período';
  document.getElementById('hm-note').textContent = `${Object.keys(byDate).length} días con actividad`;

  if (state.mode === 'mes') buildMonthCalendar(byDate, state.monthAnchor);
  else buildHeatmap(byDate, from, to);

  buildDow(byDate);
  buildTrend(byDate, from, to);

  renderBars('type-bars', Object.entries(byType).sort((a,b)=>b[1]-a[1]).slice(0,6), 'sin datos de tipo');
  renderBars('client-bars', Object.entries(byClient).sort((a,b)=>b[1]-a[1]).slice(0,6), 'sin datos de cliente');
  renderBars('project-bars', Object.entries(byProject).sort((a,b)=>b[1]-a[1]).slice(0,5), 'sin datos de proyecto');

  setLoading(false);
}

function level(n) { if (n < 0) return 'out'; if (!n) return 'empty'; if (n===1) return 'l1'; if (n<=3) return 'l2'; if (n<=6) return 'l3'; return 'l4'; }

/* ---------- heatmap semanal (Año / 90 días / Personalizado) ---------- */
function buildHeatmap(byDate, fromDate, toDate) {
  const cells = [];
  const start = new Date(fromDate); start.setDate(start.getDate() - ((start.getDay()+6)%7)); // lunes
  const fromS = localISO(fromDate), toS = localISO(toDate);
  const cur = new Date(start);
  while (cur <= toDate) {
    const ds = localISO(cur);
    cells.push({ date: ds, count: (ds >= fromS && ds <= toS) ? (byDate[ds] || 0) : -1, month: cur.getMonth() });
    cur.setDate(cur.getDate() + 1);
  }
  const weeks = []; for (let i = 0; i < cells.length; i += 7) weeks.push(cells.slice(i, i+7));

  // Tamaño de celda: en rangos cortos las celdas crecen para rellenar el ancho
  // disponible (cuadradas, con tope); en "Año" se mantienen 11px + scroll.
  const GAP = 3;
  const avail = (document.getElementById('heatmap-body').clientWidth || 780) - 28;
  const natural = weeks.length*11 + (weeks.length-1)*GAP;
  const fill = natural <= avail;
  const cell = fill ? Math.max(11, Math.min(26, Math.floor((avail - (weeks.length-1)*GAP) / weeks.length))) : 11;
  const stride = cell + GAP;

  const monthLabels = []; let lastM = -1;
  weeks.forEach((w, wi) => { const f = w.find(c => c.count >= 0); if (f && f.month !== lastM) { monthLabels.push({wi, label: MONTHS[f.month]}); lastM = f.month; } });

  const wrap = document.createElement('div');
  wrap.style.cssText = `display:flex;align-items:flex-start;justify-content:${fill?'center':'flex-start'}`;

  const dayLbls = document.createElement('div'); dayLbls.className = 'hm-labels-days'; dayLbls.style.gap = GAP+'px';
  ['lun','','mié','','vie','',''].forEach(l => { const s = document.createElement('span'); s.textContent = l; s.style.height = cell+'px'; s.style.lineHeight = cell+'px'; dayLbls.appendChild(s); });

  const scroll = document.createElement('div'); scroll.className = 'hm-scroll';
  scroll.style.cssText = fill ? 'flex:0 0 auto' : 'overflow-x:auto;flex:1';
  const inner = document.createElement('div'); inner.style.cssText = 'display:flex;flex-direction:column';

  const mRow = document.createElement('div');
  mRow.style.cssText = `position:relative;margin-bottom:5px;height:14px;width:${weeks.length*stride}px;font-size:10px;color:var(--muted)`;
  monthLabels.forEach(({wi, label}) => { const lb = document.createElement('span'); lb.style.cssText = `position:absolute;left:${wi*stride}px;white-space:nowrap`; lb.textContent = label; mRow.appendChild(lb); });

  const grid = document.createElement('div'); grid.style.cssText = `display:flex;gap:${GAP}px;min-width:max-content`;
  weeks.forEach(week => {
    const col = document.createElement('div'); col.style.cssText = `display:flex;flex-direction:column;gap:${GAP}px`;
    week.forEach(c => {
      const el = document.createElement('div'); el.className = `hm-cell ${level(c.count)}`;
      el.style.width = cell+'px'; el.style.height = cell+'px';
      if (c.count >= 0) {
        const dl = new Date(c.date + 'T12:00:00').toLocaleDateString('es-MX', {weekday:'short',day:'numeric',month:'short'});
        el.addEventListener('mouseenter', e => showTip(e, `${dl} · ${c.count} tarea${c.count!==1?'s':''}`));
        el.addEventListener('mouseleave', hideTip); el.addEventListener('mousemove', moveTip);
      }
      col.appendChild(el);
    });
    grid.appendChild(col);
  });

  inner.appendChild(mRow); inner.appendChild(grid); scroll.appendChild(inner);
  wrap.appendChild(dayLbls); wrap.appendChild(scroll);
  const body = document.getElementById('heatmap-body'); body.innerHTML = ''; body.appendChild(wrap);
  if (!fill) scroll.scrollLeft = scroll.scrollWidth;
}

/* ---------- calendario mensual (Mes) ---------- */
function buildMonthCalendar(byDate, anchor) {
  const year = anchor.getFullYear(), month = anchor.getMonth();
  const first = new Date(year, month, 1);
  const lead = (first.getDay()+6)%7; // lunes=0
  const days = new Date(year, month+1, 0).getDate();
  const td = localISO(new Date());

  const cal = document.createElement('div'); cal.className = 'cal';
  ['lun','mar','mié','jue','vie','sáb','dom'].forEach(d => { const h = document.createElement('div'); h.className = 'cal-head'; h.textContent = d; cal.appendChild(h); });
  for (let i = 0; i < lead; i++) { const b = document.createElement('div'); b.className = 'cal-cell blank'; cal.appendChild(b); }
  for (let d = 1; d <= days; d++) {
    const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const n = byDate[ds] || 0;
    const cell = document.createElement('div');
    cell.className = `cal-cell ${level(n)}${ds===td?' today':''}`;
    cell.textContent = d;
    const dl = new Date(ds + 'T12:00:00').toLocaleDateString('es-MX', {weekday:'short',day:'numeric',month:'short'});
    cell.addEventListener('mouseenter', e => showTip(e, `${dl} · ${n} tarea${n!==1?'s':''}`));
    cell.addEventListener('mouseleave', hideTip); cell.addEventListener('mousemove', moveTip);
    cal.appendChild(cell);
  }
  const body = document.getElementById('heatmap-body'); body.innerHTML = ''; body.appendChild(cal);
}

/* ---------- tooltip ---------- */
const tip = document.getElementById('tooltip');
function showTip(e, t) { tip.textContent = t; tip.style.opacity = '1'; moveTip(e); }
function hideTip() { tip.style.opacity = '0'; }
function moveTip(e) { tip.style.left = (e.clientX+14)+'px'; tip.style.top = (e.clientY-28)+'px'; }

/* ---------- gráficas ---------- */
function chartColors() { const c = getComputedStyle(document.documentElement); return n => c.getPropertyValue(n).trim(); }

function buildDow(byDate) {
  const v = chartColors();
  const tc = v('--chart-tick'), gc = v('--chart-grid');
  const dow = [0,0,0,0,0,0,0]; // lun..dom
  Object.entries(byDate).forEach(([d,n]) => { dow[(new Date(d+'T12:00:00').getDay()+6)%7] += n; });
  if (chartDow) chartDow.destroy();
  chartDow = new Chart(document.getElementById('chart-dow'), {
    type: 'bar',
    data: { labels: ['lun','mar','mié','jue','vie','sáb','dom'], datasets: [{ data: dow, backgroundColor: v('--bar'), borderRadius: 3, hoverBackgroundColor: v('--bar-hover') }] },
    options: baseOpts(tc, gc, ' tareas')
  });
}

function buildTrend(byDate, from, to) {
  const v = chartColors();
  const tc = v('--chart-tick'), gc = v('--chart-grid');
  let labels = [], data = [], title = 'tendencia mensual';
  if (state.mode === 'mes') {
    title = 'tendencia diaria';
    const year = state.monthAnchor.getFullYear(), month = state.monthAnchor.getMonth();
    const days = new Date(year, month+1, 0).getDate();
    for (let d = 1; d <= days; d++) {
      const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      labels.push(String(d)); data.push(byDate[ds] || 0);
    }
  } else {
    const c = new Date(from.getFullYear(), from.getMonth(), 1);
    const end = new Date(to.getFullYear(), to.getMonth(), 1);
    while (c <= end) {
      const ym = `${c.getFullYear()}-${String(c.getMonth()+1).padStart(2,'0')}`;
      labels.push(MONTHS[c.getMonth()]);
      data.push(Object.entries(byDate).filter(([dt]) => dt.startsWith(ym)).reduce((a,[,vv]) => a+vv, 0));
      c.setMonth(c.getMonth()+1);
    }
  }
  document.getElementById('trend-title').textContent = title;
  if (chartTrend) chartTrend.destroy();
  chartTrend = new Chart(document.getElementById('chart-trend'), {
    type: 'line',
    data: { labels, datasets: [{ data, borderColor: v('--line'), backgroundColor: v('--line-fill'), tension: 0.4, fill: true, pointBackgroundColor: v('--point'), pointRadius: state.mode==='mes'?2:3, pointHoverRadius: 5 }] },
    options: baseOpts(tc, gc, ' tareas')
  });
}

function baseOpts(tc, gc, suffix) {
  return { responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ` ${ctx.raw}${suffix}` } } },
    scales: { x: { ticks: { color: tc, font: { size: 10 } }, grid: { display: false }, border: { display: false } },
              y: { ticks: { color: tc, font: { size: 10 } }, grid: { color: gc }, border: { display: false }, beginAtZero: true } } };
}

/* ---------- barras genéricas (tipo / cliente / proyecto) ---------- */
function renderBars(elId, entries, emptyMsg) {
  const el = document.getElementById(elId);
  if (!entries.length) { el.innerHTML = `<div class="bars-empty">${emptyMsg}</div>`; return; }
  const max = entries[0][1];
  el.innerHTML = entries.map(([name, count]) => {
    const pct = Math.round((count/max)*100);
    return `<div class="proj-row"><div class="proj-head"><span class="proj-name" title="${esc(name)}">${esc(name)}</span><span class="proj-count">${count}</span></div><div class="proj-track"><div class="proj-fill" style="width:${pct}%"></div></div></div>`;
  }).join('');
}

/* ---------- init ---------- */
document.querySelectorAll('#seg button').forEach(b => {
  b.addEventListener('click', () => {
    state.mode = b.dataset.mode;
    if (state.mode === 'mes') state.monthAnchor = firstOfMonth(new Date());
    render();
  });
});
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => { if (allTasks.length) render(); });

loadData();
</script>
